          type: integer
          example: 1
        city_name:
          type: string
          example: "Bangalore"
        slug:
          type: string
          example: "bangalore"
        created_at:
          type: string
          format: date-time
          example: "2025-03-01T10:00:00Z"

    Batch:
      type: object
      properties:
