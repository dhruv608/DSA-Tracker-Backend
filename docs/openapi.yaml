          type: integer
          example: 1
        batch_name:
          type: string
          example: "SO-Batch-2025"
        slug:
          type: string
          example: "so-batch-2025"
        year:
          type: integer
          example: 2025
        city:
          $ref: '#/components/schemas/City'
        created_at:
          type: string
          format: date-time
          example: "2025-03-01T10:00:00Z"

    # Content Schemas
    Topic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        topic_name:
          type: string
          example: "Arrays and Strings"
        slug:
          type: string
          example: "arrays-strings"
        description:
          type: string
          example: "Fundamental data structures"
        order:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: "2025-03-01T10:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-03-01T10:00:00Z"

    Question:
      type: object
      properties:
        id:
          type: integer
          example: 1
        question_name:
          type: string
          example: "Two Sum"
        question_link:
          type: string
          format: uri
          example: "https://leetcode.com/problems/two-sum/"
        platform:
          type: string
          enum: [LEETCODE, GFG, OTHER, INTERVIEWBIT]
          example: "LEETCODE"
        level:
          type: string
          enum: [EASY, MEDIUM, HARD]
          example: "EASY"
        type:
          type: string
          enum: [HOMEWORK, CLASSWORK]
          example: "HOMEWORK"
        topic:
          $ref: '#/components/schemas/Topic'
        created_at:
          type: string
          format: date-time
          example: "2025-03-01T10:00:00Z"

    # Student Response Schemas
    StudentTopic:
