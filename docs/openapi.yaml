openapi: 3.0.0
info:
  title: DSA Tracker API Documentation
  description: Interactive API documentation for the DSA Tracker backend services. This platform manages Data Structures & Algorithms learning progress with multi-tenant support for cities, batches, and role-based access control.
  version: 1.0.0
  contact:
    name: DSA Tracker Team
    email: support@dsatracker.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000
    description: Development server
  - url: https://api.dsatracker.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and authorization endpoints
  - name: Students
    description: Student-specific endpoints for learning progress
  - name: Admin
    description: Teacher/Intern endpoints for content management
  - name: SuperAdmin
    description: SuperAdmin endpoints for system administration
  - name: Health
    description: System health and monitoring endpoints

paths:
  # Health Check
  /health:
    get:
      tags:
        - Health
      summary: System health check
      description: Check if the API server is running properly
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-03-10T22:30:00Z"

  # Authentication Endpoints
  /api/auth/student/logout:
    post:
      tags:
        - Authentication
      summary: Student logout
      description: Logout student and clear refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student logout successful"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/admin/logout:
    post:
      tags:
        - Authentication
      summary: Admin logout
      description: Logout admin and clear refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Admin logout successful"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/student/register:
    post:
      tags:
        - Authentication
      summary: Register new student
      description: Register a new student account with batch assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - username
                - password
                - batch_id
              properties:
                name:
                  type: string
                  example: "Dhruv Narang"
                email:
                  type: string
                  format: email
                  example: "john@example.com"
                username:
                  type: string
                  example: "johndoe"
                password:
                  type: string
                  format: password
                  example: "password123"
                enrollment_id:
                  type: string
                  example: "ENR2025001"
                batch_id:
                  type: integer
                  example: 1
                leetcode_id:
                  type: string
                  example: "johndoe_lc"
                gfg_id:
                  type: string
                  example: "johndoe_gfg"
                github:
                  type: string
                  example: "johndoe"
                linkedin:
                  type: string
                  example: "john-doe"
      responses:
        '201':
          description: Student registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student registered successfully"
                  user:
                    $ref: '#/components/schemas/Student'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/student/login:
    post:
      tags:
        - Authentication
      summary: Student login
      description: Authenticate student and return JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "john@example.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/Student'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/admin/login:
    post:
      tags:
        - Authentication
      summary: Admin login
      description: Authenticate admin (Teacher/Intern/SuperAdmin) and return JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "teacher@example.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/Admin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Student Endpoints
  /api/students/topics:
    get:
      tags:
        - Students
      summary: Get student topics
      description: Get all topics with batch-specific progress for authenticated student
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Topics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StudentTopic'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/topics/{topicSlug}:
    get:
      tags:
        - Students
      summary: Get topic details
      description: Get topic overview with classes and progress details
      security:
        - bearerAuth: []
      parameters:
        - name: topicSlug
          in: path
          required: true
          schema:
            type: string
          example: "arrays-strings"
      responses:
        '200':
          description: Topic details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/topics/{topicSlug}/classes/{classSlug}:
    get:
      tags:
        - Students
      summary: Get class questions
      description: Get class details with all assigned questions and student progress
      security:
        - bearerAuth: []
      parameters:
        - name: topicSlug
          in: path
          required: true
          schema:
            type: string
          example: "arrays-strings"
        - name: classSlug
          in: path
          required: true
          schema:
            type: string
          example: "intro-arrays"
      responses:
        '200':
          description: Class details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/addedQuestions:
    get:
      tags:
        - Students
      summary: Get student questions
      description: Get all assigned questions with filters, pagination, and solve status
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search in question names and topics
        - name: topic
          in: query
          schema:
            type: string
          description: Filter by topic slug
        - name: level
          in: query
          schema:
            type: string
            enum: [EASY, MEDIUM, HARD]
          description: Filter by difficulty
        - name: platform
          in: query
          schema:
            type: string
            enum: [LEETCODE, GFG, OTHER, INTERVIEWBIT]
          description: Filter by platform
        - name: type
          in: query
          schema:
            type: string
            enum: [HOMEWORK, CLASSWORK]
          description: Filter by type
        - name: solved
          in: query
          schema:
            type: boolean
          description: Filter by solve status
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        '200':
          description: Questions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/leaderboard:
    post:
      tags:
        - Students
      summary: Get student leaderboard
      description: Get leaderboard with personal rank and top performers
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  default: 10
                  example: 10
      responses:
        '200':
          description: Leaderboard retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/profile:
    get:
      tags:
        - Students
      summary: Get student profile
      description: Get complete student profile with all sections
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Admin Endpoints
  /api/admin/topics:
    get:
      tags:
        - Admin
      summary: Get all topics (Admin)
      description: Get all topics available for content management
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Topics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  topics:
                    type: array
                    items:
                      $ref: '#/components/schemas/Topic'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Admin
      summary: Create topic
      description: Create new topic for curriculum
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic_name
              properties:
                topic_name:
                  type: string
                  example: "Dynamic Programming"
                description:
                  type: string
                  example: "Introduction to DP concepts and patterns"
                order:
                  type: integer
                  example: 5
      responses:
        '201':
          description: Topic created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Topic created successfully"
                  topic:
                    $ref: '#/components/schemas/Topic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/topics/{id}:
    patch:
      tags:
        - Admin
      summary: Update topic
      description: Update existing topic information
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topic_name:
                  type: string
                  example: "Dynamic Programming Updated"
                description:
                  type: string
                  example: "Comprehensive DP guide with advanced patterns"
                order:
                  type: integer
                  example: 6
      responses:
        '200':
          description: Topic updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Topic updated successfully"
                  topic:
                    $ref: '#/components/schemas/Topic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Admin
      summary: Delete topic
      description: Delete topic and all associated data
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Topic deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Topic deleted successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/questions:
    get:
      tags:
        - Admin
      summary: Get all questions (Admin)
      description: Get all questions for management
      security:
        - bearerAuth: []
      parameters:
        - name: topic
          in: query
          schema:
            type: integer
          description: Filter by topic ID
        - name: platform
          in: query
          schema:
            type: string
            enum: [LEETCODE, GFG, OTHER, INTERVIEWBIT]
          description: Filter by platform
        - name: level
          in: query
          schema:
            type: string
            enum: [EASY, MEDIUM, HARD]
          description: Filter by difficulty
        - name: search
          in: query
          schema:
            type: string
          description: Search in question names
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        '200':
          description: Questions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Admin
      summary: Create question
      description: Create new question for assignment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question_name
                - question_link
                - topic_id
              properties:
                question_name:
                  type: string
                  example: "Maximum Subarray"
                question_link:
                  type: string
                  format: uri
                  example: "https://leetcode.com/problems/maximum-subarray/"
                platform:
                  type: string
                  enum: [LEETCODE, GFG, OTHER, INTERVIEWBIT]
                  default: LEETCODE
                  example: "LEETCODE"
                level:
                  type: string
                  enum: [EASY, MEDIUM, HARD]
                  default: MEDIUM
                  example: "MEDIUM"
                type:
                  type: string
                  enum: [HOMEWORK, CLASSWORK]
                  default: HOMEWORK
                  example: "HOMEWORK"
                topic_id:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Question created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Question created successfully"
                  question:
                    $ref: '#/components/schemas/Question'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/dashboard:
    get:
      tags:
        - Admin
      summary: Get admin dashboard
      description: Get dashboard statistics and overview
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboard'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/leaderboard:
    post:
      tags:
        - Admin
      summary: Get admin leaderboard
      description: Get batch leaderboard with pagination and search
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                page:
                  type: integer
                  default: 1
                  example: 1
                limit:
                  type: integer
                  default: 20
                  example: 20
                search:
                  type: string
                  example: "john"
      responses:
        '200':
          description: Leaderboard retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLeaderboard'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/students:
    get:
      tags:
        - Admin
      summary: Get all students (Admin)
      description: Get all students in admin's batch with progress
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name/email/username
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        '200':
          description: Students retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminStudentsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Admin
      summary: Create student (Admin)
      description: Create new student account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - username
                - password
                - batch_id
              properties:
                name:
                  type: string
                  example: "Jane Smith"
                email:
                  type: string
                  format: email
                  example: "jane@example.com"
                username:
                  type: string
                  example: "janesmith"
                password:
                  type: string
                  format: password
                  example: "password123"
                batch_id:
                  type: integer
                  example: 1
                leetcode_id:
                  type: string
                  example: "janesmith_lc"
                gfg_id:
                  type: string
                  example: "janesmith_gfg"
      responses:
        '201':
          description: Student created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student created successfully"
                  student:
                    $ref: '#/components/schemas/Student'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/students/{username}:
    get:
      tags:
        - Admin
      summary: Get student report by username
      description: Get detailed report for a specific student
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: "johndoe"
      responses:
        '200':
          description: Student report retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/students/{id}:
    patch:
      tags:
        - Admin
      summary: Update student details
      description: Update student information
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Updated Name"
                email:
                  type: string
                  format: email
                  example: "updated@example.com"
                leetcode_id:
                  type: string
                  example: "updated_lc"
                gfg_id:
                  type: string
                  example: "updated_gfg"
      responses:
        '200':
          description: Student updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student updated successfully"
                  student:
                    $ref: '#/components/schemas/Student'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Admin
      summary: Delete student
      description: Delete student account (hard delete)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Student deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student deleted successfully"
