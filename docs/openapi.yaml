openapi: 3.0.0
info:
  title: DSA Tracker API Documentation
  description: Interactive API documentation for the DSA Tracker backend services. This platform manages Data Structures & Algorithms learning progress with multi-tenant support for cities, batches, and role-based access control.
  version: 1.0.0
  contact:
    name: DSA Tracker Team
    email: support@dsatracker.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5000
    description: Development server
  - url: https://api.dsatracker.com
    description: Production server

tags:
  - name: Authentication
    description: User authentication and authorization endpoints
  - name: Students
    description: Student-specific endpoints for learning progress
  - name: Admin
    description: Teacher/Intern endpoints for content management
  - name: SuperAdmin
    description: SuperAdmin endpoints for system administration
  - name: Health
    description: System health and monitoring endpoints

paths:
  # Health Check
  /health:
    get:
      tags:
        - Health
      summary: System health check
      description: Check if the API server is running properly
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "OK"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-03-10T22:30:00Z"

  # Authentication Endpoints
  /api/auth/student/logout:
    post:
      tags:
        - Authentication
      summary: Student logout
      description: Logout student and clear refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student logout successful"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/admin/logout:
    post:
      tags:
        - Authentication
      summary: Admin logout
      description: Logout admin and clear refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Admin logout successful"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/auth/student/register:
    post:
      tags:
        - Authentication
      summary: Register new student
      description: Register a new student account with batch assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - username
                - password
                - batch_id
              properties:
                name:
                  type: string
                  example: "Dhruv Narang"
                email:
                  type: string
                  format: email
                  example: "john@example.com"
                username:
                  type: string
                  example: "johndoe"
                password:
                  type: string
                  format: password
                  example: "password123"
                enrollment_id:
                  type: string
                  example: "ENR2025001"
                batch_id:
                  type: integer
                  example: 1
                leetcode_id:
                  type: string
                  example: "johndoe_lc"
                gfg_id:
                  type: string
                  example: "johndoe_gfg"
                github:
                  type: string
                  example: "johndoe"
                linkedin:
                  type: string
                  example: "john-doe"
      responses:
        '201':
          description: Student registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student registered successfully"
                  user:
                    $ref: '#/components/schemas/Student'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/student/login:
    post:
      tags:
        - Authentication
      summary: Student login
      description: Authenticate student and return JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "john@example.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/Student'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/admin/login:
    post:
      tags:
        - Authentication
      summary: Admin login
      description: Authenticate admin (Teacher/Intern/SuperAdmin) and return JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "teacher@example.com"
                password:
                  type: string
                  format: password
                  example: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/Admin'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Student Endpoints
  /api/students/topics:
    get:
      tags:
        - Students
      summary: Get student topics
      description: Get all topics with batch-specific progress for authenticated student
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Topics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StudentTopic'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/topics/{topic}:
    get:
      tags:
        - Students
      summary: Get topic details
      description: Get topic overview with classes and progress details
      security:
        - bearerAuth: []
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
          example: "arrays-strings"
      responses:
        '200':
          description: Topic details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/topics/{topic}/classes/{class}:
    get:
      tags:
        - Students
      summary: Get class questions
      description: Get class details with all assigned questions and student progress
      security:
        - bearerAuth: []
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
          example: "arrays-strings"
        - name: class
          in: path
          required: true
          schema:
            type: string
          example: "intro-arrays"
      responses:
        '200':
          description: Class details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/addedQuestions:
    get:
      tags:
        - Students
      summary: Get student questions
      description: Get all assigned questions with filters, pagination, and solve status
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search in question names and topics
        - name: topic
          in: query
          schema:
            type: string
          description: Filter by topic slug
        - name: level
          in: query
          schema:
            type: string
            enum: [EASY, MEDIUM, HARD]
          description: Filter by difficulty
        - name: platform
          in: query
          schema:
            type: string
            enum: [LEETCODE, GFG, OTHER, INTERVIEWBIT]
          description: Filter by platform
        - name: type
          in: query
          schema:
            type: string
            enum: [HOMEWORK, CLASSWORK]
          description: Filter by type
        - name: solved
          in: query
          schema:
            type: boolean
          description: Filter by solve status
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Items per page
      responses:
        '200':
          description: Questions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/leaderboard:
    post:
      tags:
        - Students
      summary: Get student leaderboard
      description: Get leaderboard with personal rank and top performers
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  default: 10
                  example: 10
      responses:
        '200':
          description: Leaderboard retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/profile:
    get:
      tags:
        - Students
      summary: Get student profile
      description: Get complete student profile with all sections
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Student Test Endpoints
  /api/students/test/basic:
    get:
      tags:
        - Students
      summary: Test student basic info
      description: Test basic student information and coding platform integration
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: "johndoe"
      responses:
        '200':
          description: Student basic info test completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Basic info test completed"
                  data:
                    type: object
                    properties:
                      username:
                        type: string
                        example: "johndoe"
                      leetcode_profile:
                        type: object
                        properties:
                          username:
                            type: string
                            example: "johndoe_lc"
                          total_solved:
                            type: integer
                            example: 50
                          easy:
                            type: integer
                            example: 20
                          medium:
                            type: integer
                            example: 25
                          hard:
                            type: integer
                            example: 5
                          homework:
                            type: integer
                            example: 30
                          classwork:
                            type: integer
                            example: 20
                      gfg_profile:
                        type: object
                        properties:
                          username:
                            type: string
                            example: "johndoe_gfg"
                          total_solved:
                            type: integer
                            example: 30
                          easy:
                            type: integer
                            example: 15
                          medium:
                            type: integer
                            example: 10
                          hard:
                            type: integer
                            example: 5
                          homework:
                            type: integer
                            example: 18
                          classwork:
                            type: integer
                            example: 12
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/test/stats:
    get:
      tags:
        - Students
      summary: Test student coding statistics
      description: Test coding statistics and progress tracking
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: "johndoe"
      responses:
        '200':
          description: Coding stats test completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Coding stats test completed"
                  data:
                    type: object
                    properties:
                      username:
                        type: string
                        example: "johndoe"
                      total_solved:
                        type: integer
                        example: 45
                      easy:
                        type: integer
                        example: 20
                      medium:
                        type: integer
                        example: 20
                      hard:
                        type: integer
                        example: 5
                      average_difficulty:
                        type: number
                        example: 2.5
                      streak_days:
                        type: integer
                        example: 15
                      best_day_streak:
                        type: integer
                        example: 7
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/test/streak:
    get:
      tags:
        - Students
      summary: Test student streak information
      description: Test consecutive days of problem solving
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: "johndoe"
      responses:
        '200':
          description: Streak test completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Streak test completed"
                  data:
                    type: object
                    properties:
                      username:
                        type: string
                        example: "johndoe"
                      current_streak:
                        type: integer
                        example: 5
                      best_streak:
                        type: integer
                        example: 12
                      streak_history:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                                type: string
                                example: "2025-03-10"
                            problems_solved:
                                type: integer
                                example: 3
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/test/leaderboard:
    get:
      tags:
        - Students
      summary: Test student leaderboard position
      description: Test student ranking and leaderboard functionality
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: "johndoe"
      responses:
        '200':
          description: Leaderboard test completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Leaderboard test completed"
                  data:
                    type: object
                    properties:
                      username:
                        type: string
                        example: "johndoe"
                      global_rank:
                        type: integer
                        example: 15
                      city_rank:
                        type: integer
                        example: 3
                      total_students:
                        type: integer
                        example: 100
                      leaderboard_sample:
                        type: array
                        items:
                          type: object
                          properties:
                            username:
                                type: string
                                example: "student1"
                            global_rank:
                                type: integer
                                example: 1
                            score:
                                type: number
                                example: 2450.75
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/test/heatmap:
    get:
      tags:
        - Students
      summary: Test student activity heatmap
      description: Test student activity patterns and progress visualization
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: "johndoe"
      responses:
        '200':
          description: Heatmap test completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Heatmap test completed"
                  data:
                    type: object
                    properties:
                      username:
                        type: string
                        example: "johndoe"
                      heatmap_data:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                                type: string
                                example: "2025-03-10"
                            problems_solved:
                                type: integer
                                example: 3
                            difficulty_distribution:
                                type: object
                                properties:
                                  easy:
                                    type: integer
                                    example: 2
                                  medium:
                                    type: integer
                                    example: 1
                                  hard:
                                    type: integer
                                    example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/test/topic:
    get:
      tags:
        - Students
      summary: Test topic progress tracking
      description: Test student progress on specific topics
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: "johndoe"
      responses:
        '200':
          description: Topic progress test completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Topic progress test completed"
                  data:
                    type: object
                    properties:
                      username:
                        type: string
                        example: "johndoe"
                      topic_progress:
                        type: array
                        items:
                          type: object
                          properties:
                            topic_name:
                                type: string
                                example: "Dynamic Programming"
                            completion_percentage:
                                type: number
                                example: 75.0
                            questions_solved:
                                type: integer
                                example: 15
                            total_questions:
                                type: integer
                                example: 20
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/test/activity:
    get:
      tags:
        - Students
      summary: Test recent student activity
      description: Test recent student activity and progress tracking
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          example: "johndoe"
      responses:
        '200':
          description: Activity test completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Activity test completed"
                  data:
                    type: object
                    properties:
                      username:
                        type: string
                        example: "johndoe"
                      recent_activity:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                                type: integer
                                example: 1
                            question_name:
                                type: string
                                example: "Maximum Subarray"
                            platform:
                                type: string
                                example: "LEETCODE"
                            level:
                                type: string
                                example: "MEDIUM"
                            type:
                                type: string
                                example: "HOMEWORK"
                            topic:
                                type: string
                                example: "Dynamic Programming"
                            sync_at:
                                type: string
                                example: "2025-03-10T22:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/cities:
    get:
      tags:
        - Admin
      summary: Get all cities
      description: Get all available cities for admin management
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cities retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cities:
                    type: array
                    items:
                      $ref: '#/components/schemas/City'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/batches:
    get:
      tags:
        - Admin
      summary: Get all batches
      description: Get all batches for admin management
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Batches retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  batches:
                    type: array
                    items:
                      $ref: '#/components/schemas/Batch'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Admin
      summary: Create batch
      description: Create new batch for student organization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - batch_name
                - year
                - city_id
              properties:
                batch_name:
                  type: string
                  example: "2025 Batch A"
                year:
                  type: integer
                  example: 2025
                city_id:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Batch created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Batch created successfully"
                  batch:
                    $ref: '#/components/schemas/Batch'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/topics/bulk:
    post:
      tags:
        - Admin
      summary: Create topics bulk
      description: Create multiple topics at once
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topics
              properties:
                topics:
                  type: array
