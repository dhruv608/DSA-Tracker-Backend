# Components Section for Essential Schemas Only
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT authentication token. Use the token returned by login endpoints."

  schemas:
    # Core User Schemas
    Student:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        username:
          type: string
          example: "johndoe"
        city:
          $ref: '#/components/schemas/City'
        batch:
          $ref: '#/components/schemas/Batch'

    Admin:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Jane Smith"
        email:
          type: string
          format: email
          example: "jane@example.com"
        username:
          type: string
          example: "janesmith"
        role:
          type: string
          enum: [SUPERADMIN, TEACHER, INTERN]
          example: "TEACHER"
        city:
          $ref: '#/components/schemas/City'
        batch:
          $ref: '#/components/schemas/Batch'

    # Location Schemas
    City:
      type: object
      properties:
        id:
          type: integer
          example: 1
        city_name:
          type: string
          example: "Bangalore"
        slug:
          type: string
          example: "bangalore"

    Batch:
      type: object
      properties:
        id:
          type: integer
          example: 1
        batch_name:
          type: string
          example: "SO-Batch-2025"
        slug:
          type: string
          example: "so-batch-2025"
        year:
          type: integer
          example: 2025
        city:
          $ref: '#/components/schemas/City'

    # Content Schemas
    Topic:
      type: object
      properties:
        id:
          type: integer
          example: 1
        topic_name:
          type: string
          example: "Arrays and Strings"
        slug:
          type: string
          example: "arrays-strings"
        description:
          type: string
          example: "Fundamental data structures"
        order:
          type: integer
          example: 1

    Question:
      type: object
      properties:
        id:
          type: integer
          example: 1
        question_name:
          type: string
          example: "Two Sum"
        question_link:
          type: string
          format: uri
          example: "https://leetcode.com/problems/two-sum/"
        platform:
          type: string
          enum: [LEETCODE, GFG, OTHER, INTERVIEWBIT]
          example: "LEETCODE"
        level:
          type: string
          enum: [EASY, MEDIUM, HARD]
          example: "EASY"
        type:
          type: string
          enum: [HOMEWORK, CLASSWORK]
          example: "HOMEWORK"
        topic:
          $ref: '#/components/schemas/Topic'

    # Response Wrappers
    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: "Operation successful"
        data:
          type: object
          description: "Response data varies by endpoint"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Error message"
        code:
          type: string
          example: "ERROR_CODE"

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        totalPages:
          type: integer
          example: 8

  # Standard Error Responses
  responses:
    BadRequest:
      description: Bad request - Invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Unauthorized - Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Conflict - Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
